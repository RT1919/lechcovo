{% extends "base.html" %}
{% block content %}
<div class="container" style="padding-top: 40px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h1>Bonjour, {{ current_user.name }}</h1>
        <div style="background: #e8f5e9; padding: 10px 20px; border-radius: 50px; border: 1px solid #2ecc71; color: #2e7d32;">
            <span style="font-weight: 800;">🌱 +{{ impact.co2|round(1) }}kg CO2 sauvé</span>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px;">
        <div style="background: white; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
            <div style="font-size: 1.5rem;">💶</div>
            <div style="font-weight: bold; font-size: 1.2rem;">{{ impact.money|round(1) }}€</div>
            <small style="color: var(--gray);">Économisés au total</small>
        </div>
        <div style="background: white; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
            <div style="font-size: 1.5rem;">🎟️</div>
            <div style="font-weight: bold; font-size: 1.2rem;">{{ impact.rides }}</div>
            <small style="color: var(--gray);">Trajets réservés</small>
        </div>
    </div>

    ...
</div>
{% endblock %}
